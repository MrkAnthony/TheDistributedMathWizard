<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 400" width="100%" height="100%">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#003366" />
    </marker>
    <style>
      .box { fill: #f8f9fa; stroke: #003366; stroke-width: 2; rx: 8; }
      .text { font-family: 'Roboto', sans-serif; font-size: 14px; fill: #333; text-anchor: middle; }
      .title { font-family: 'Roboto', sans-serif; font-size: 16px; font-weight: bold; fill: #003366; text-anchor: middle; }
      .line { stroke: #003366; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .line-dashed { stroke: #003366; stroke-width: 2; fill: none; stroke-dasharray: 5,5; marker-end: url(#arrow); }
    </style>
  </defs>

  <!-- Client -->
  <rect x="20" y="180" width="100" height="80" class="box" />
  <image href="./laptop.png" x="50" y="190" width="40" height="30" />
  <text x="70" y="240" class="title">Client</text>

  <!-- Cloudflare -->
  <rect x="160" y="180" width="100" height="80" class="box" />
  <image href="https://upload.wikimedia.org/wikipedia/commons/4/4b/Cloudflare_Logo.svg" x="170" y="190" width="80" height="25" />
  <text x="210" y="235" class="title">Cloudflare</text>
  <text x="210" y="250" class="text" style="font-size: 12px;">Zero Trust</text>

  <!-- Nginx -->
  <rect x="300" y="180" width="100" height="80" class="box" />
  <image href="https://upload.wikimedia.org/wikipedia/commons/c/c5/Nginx_logo.svg" x="310" y="190" width="80" height="25" />
  <text x="350" y="235" class="title">Nginx</text>
  <text x="350" y="250" class="text" style="font-size: 12px;">Load Balancer</text>

  <!-- API Replicas -->
  <text x="490" y="60" class="title">API (Producers)</text>
  <rect x="440" y="80" width="100" height="60" class="box" />
  <image href="https://upload.wikimedia.org/wikipedia/commons/c/c3/Python-logo-notext.svg" x="448" y="98" width="24" height="24" />
  <text x="502" y="115" class="text">Node 1</text>
  
  <rect x="440" y="180" width="100" height="60" class="box" />
  <image href="https://upload.wikimedia.org/wikipedia/commons/c/c3/Python-logo-notext.svg" x="448" y="198" width="24" height="24" />
  <text x="502" y="215" class="text">Node 2</text>
  
  <rect x="440" y="280" width="100" height="60" class="box" />
  <image href="https://upload.wikimedia.org/wikipedia/commons/c/c3/Python-logo-notext.svg" x="448" y="298" width="24" height="24" />
  <text x="502" y="315" class="text">Node 3</text>

  <!-- Valkey -->
  <path d="M 580 180 L 580 260 A 50 15 0 0 0 680 260 L 680 180 Z" fill="#f8f9fa" stroke="#B6862C" stroke-width="2"/>
  <ellipse cx="630" cy="180" rx="50" ry="15" fill="#f8f9fa" stroke="#B6862C" stroke-width="2"/>
  <image href="https://valkey.io/img/valkey-logo-og.png" x="605" y="195" width="50" height="30" />
  <text x="630" y="235" class="title" fill="#B6862C">Valkey</text>
  <text x="630" y="250" class="text" style="font-size: 12px;">Shared State</text>

  <!-- Workers -->
  <text x="770" y="60" class="title">Workers (Consumers)</text>
  <rect x="720" y="80" width="100" height="60" class="box" />
  <image href="https://upload.wikimedia.org/wikipedia/commons/c/c3/Python-logo-notext.svg" x="728" y="98" width="24" height="24" />
  <text x="782" y="115" class="text">Worker 1</text>
  
  <rect x="720" y="180" width="100" height="60" class="box" />
  <image href="https://upload.wikimedia.org/wikipedia/commons/c/c3/Python-logo-notext.svg" x="728" y="198" width="24" height="24" />
  <text x="782" y="215" class="text">Worker 2</text>
  
  <rect x="720" y="280" width="100" height="60" class="box" />
  <image href="https://upload.wikimedia.org/wikipedia/commons/c/c3/Python-logo-notext.svg" x="728" y="298" width="24" height="24" />
  <text x="782" y="315" class="text">Worker 3</text>

  <!-- Connections -->
  <path d="M 120 210 L 155 210" class="line" />
  <path d="M 260 210 L 295 210" class="line" />
  
  <!-- Nginx to APIs -->
  <path d="M 400 210 L 420 210 L 420 110 L 435 110" class="line" />
  <path d="M 400 210 L 435 210" class="line" />
  <path d="M 400 210 L 420 210 L 420 310 L 435 310" class="line" />

  <!-- APIs to Valkey -->
  <path d="M 540 110 L 560 110 L 560 210 L 575 210" class="line-dashed" />
  <path d="M 540 210 L 575 210" class="line-dashed" />
  <path d="M 540 310 L 560 310 L 560 210 L 575 210" class="line-dashed" />

  <!-- Valkey to Workers -->
  <path d="M 680 210 L 700 210 L 700 110 L 715 110" class="line-dashed" />
  <path d="M 680 210 L 715 210" class="line-dashed" />
  <path d="M 680 210 L 700 210 L 700 310 L 715 310" class="line-dashed" />

</svg>
